<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cấp phát thuốc</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <a href="/admin/dashboard" class="navbar-brand">Admin</a>
    <a href="/logout" class="btn btn-outline-light btn-sm">Đăng xuất</a>
</nav>

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <h4>Danh sách đơn thuốc chờ cấp phát</h4>
        </div>

        <div class="card-body">

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <table class="table table-bordered table-hover bg-white">
                <thead class="thead-dark">
                <tr>
                    <th>ID đơn</th>
                    <th>Bệnh nhân</th>
                    <th>Bác sĩ</th>
                    <th>Chẩn đoán</th>
                    <th>Thuốc</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="prescription : ${prescriptions}">
                    <td th:text="${prescription.id}"></td>

                    <td th:text="${prescription.medicalRecord.appointment.patient.fullName}"></td>

                    <td th:text="${prescription.medicalRecord.appointment.doctor.user.fullName}"></td>

                    <td th:text="${prescription.medicalRecord.diagnosis}"></td>

                    <td>
                        <ul>
                            <li th:each="detail : ${prescription.details}">
                                <span th:text="${detail.medicine.name}"></span>
                                -
                                SL:
                                <span th:text="${detail.quantity}"></span>
                                -
                                <span th:text="${detail.instruction}"></span>
                            </li>
                        </ul>
                    </td>

                    <td th:text="${prescription.status}"></td>

                    <td>
                        <a th:href="@{/admin/prescriptions/dispense/{id}(id=${prescription.id})}"
                           class="btn btn-success btn-sm">
                            Xác nhận phát thuốc
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(prescriptions)}">
                    <td colspan="7" class="text-center text-muted">
                        Không có đơn thuốc chờ cấp phát
                    </td>
                </tr>
                </tbody>
            </table>

            <a href="/admin/dashboard" class="btn btn-secondary">Quay lại</a>
        </div>
    </div>
</div>

</body>
</html>
