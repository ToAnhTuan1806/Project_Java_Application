<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="col-md-6 mx-auto">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center">
                <h4>Đăng ký tài khoản bệnh nhân</h4>
            </div>

            <div class="card-body">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/register}" th:object="${registerDTO}" method="post">
                    <div class="form-group">
                        <label>Họ tên</label>
                        <input type="text" th:field="*{fullName}" class="form-control">
                        <small class="text-danger"
                               th:if="${#fields.hasErrors('fullName')}"
                               th:errors="*{fullName}"></small>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" th:field="*{email}" class="form-control">
                        <small class="text-danger"
                               th:if="${#fields.hasErrors('email')}"
                               th:errors="*{email}"></small>
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" th:field="*{password}" class="form-control">
                        <small class="text-danger"
                               th:if="${#fields.hasErrors('password')}"
                               th:errors="*{password}"></small>
                    </div>

                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" th:field="*{phone}" class="form-control">
                        <small class="text-danger"
                               th:if="${#fields.hasErrors('phone')}"
                               th:errors="*{phone}"></small>
                    </div>

                    <div class="form-group">
                        <label>Địa chỉ</label>
                        <input type="text" th:field="*{address}" class="form-control">
                        <small class="text-danger"
                               th:if="${#fields.hasErrors('address')}"
                               th:errors="*{address}"></small>
                    </div>

                    <button class="btn btn-success btn-block">Đăng ký</button>
                </form>

                <p class="mt-3 text-center">
                    Đã có tài khoản?
                    <a th:href="@{/login}">Đăng nhập</a>
                </p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
