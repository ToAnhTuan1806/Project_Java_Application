<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử bệnh án</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
    <a href="/patient/dashboard" class="navbar-brand">Bệnh nhân</a>
    <a href="/logout" class="btn btn-outline-light btn-sm">Đăng xuất</a>
</nav>

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-info text-white">
            <h4>Lịch sử bệnh án</h4>
        </div>

        <div class="card-body">

            <div th:if="${#lists.isEmpty(records)}" class="alert alert-warning">
                Bạn chưa có hồ sơ bệnh án nào.
            </div>

            <div class="card mb-3 shadow-sm" th:each="record : ${records}">
                <div class="card-header bg-light">
                    <b>Ngày khám:</b>
                    <span th:text="${record.appointment.appointmentDate}"></span>
                    -
                    <b>Giờ:</b>
                    <span th:text="${record.appointment.appointmentTime}"></span>
                    <br>
                    <b>Bác sĩ:</b>
                    <span th:text="${record.appointment.doctor.user.fullName}"></span>
                    -
                    <b>Chuyên khoa:</b>
                    <span th:text="${record.appointment.doctor.specialty.name}"></span>
                </div>

                <div class="card-body">
                    <p>
                        <b>Triệu chứng:</b>
                        <span th:text="${record.symptoms}"></span>
                    </p>

                    <p>
                        <b>Chẩn đoán:</b>
                        <span th:text="${record.diagnosis}"></span>
                    </p>

                    <hr>

                    <h5>Đơn thuốc</h5>

                    <div th:if="${record.prescription == null}" class="alert alert-warning">
                        Chưa có đơn thuốc.
                    </div>

                    <table th:if="${record.prescription != null}"
                           class="table table-bordered table-sm bg-white">
                        <thead class="thead-light">
                        <tr>
                            <th>Tên thuốc</th>
                            <th>Số lượng</th>
                            <th>Hướng dẫn sử dụng</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="detail : ${record.prescription.details}">
                            <td th:text="${detail.medicine.name}"></td>
                            <td th:text="${detail.quantity}"></td>
                            <td th:text="${detail.instruction}"></td>
                        </tr>
                        </tbody>
                    </table>

                    <p th:if="${record.prescription != null}">
                        <b>Trạng thái cấp phát:</b>
                        <span class="badge badge-warning"
                              th:if="${record.prescription.status.name() == 'WAITING_DISPENSE'}">
                            Chờ cấp phát
                        </span>

                        <span class="badge badge-success"
                              th:if="${record.prescription.status.name() == 'DISPENSED'}">
                            Đã cấp phát
                        </span>
                    </p>
                </div>
            </div>

            <a href="/patient/dashboard" class="btn btn-secondary">Quay lại</a>
        </div>
    </div>
</div>

</body>
</html>
