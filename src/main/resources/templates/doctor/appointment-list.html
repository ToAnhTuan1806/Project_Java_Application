<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bệnh nhân chờ khám</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <a href="/doctor/dashboard" class="navbar-brand">Bác sĩ</a>
    <a href="/logout" class="btn btn-outline-light btn-sm">Đăng xuất</a>
</nav>

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4>Danh sách bệnh nhân chờ khám</h4>
        </div>

        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <table class="table table-bordered table-hover bg-white">
                <thead class="thead-dark">
                <tr>
                    <th>ID lịch</th>
                    <th>Bệnh nhân</th>
                    <th>Ngày</th>
                    <th>Giờ</th>
                    <th>Thao tác</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="appointment : ${appointments}">
                    <td th:text="${appointment.id}"></td>
                    <td th:text="${appointment.patient.fullName}"></td>
                    <td th:text="${appointment.appointmentDate}"></td>
                    <td th:text="${appointment.appointmentTime}"></td>
                    <td>
                        <a th:href="@{/doctor/appointments/exam/{id}(id=${appointment.id})}"
                           class="btn btn-success btn-sm">
                            Khám bệnh
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(appointments)}">
                    <td colspan="5" class="text-center text-muted">
                        Hiện chưa có bệnh nhân chờ khám
                    </td>
                </tr>
                </tbody>
            </table>

            <a href="/doctor/dashboard" class="btn btn-secondary">Quay lại</a>
        </div>
    </div>
</div>

</body>
</html>
