<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Khám bệnh</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <a href="/doctor/appointments" class="navbar-brand">Bác sĩ</a>
    <a href="/logout" class="btn btn-outline-light btn-sm">Đăng xuất</a>
</nav>

<div class="container mt-4">
    <div class="col-md-9 mx-auto">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4>Nhập kết quả khám bệnh</h4>
            </div>

            <div class="card-body">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/doctor/appointments/exam/{id}(id=${appointmentId})}"
                      th:object="${medicalRecordDTO}"
                      method="post">

                    <div class="form-group">
                        <label>Triệu chứng</label>
                        <textarea th:field="*{symptoms}" class="form-control"></textarea>
                        <small class="text-danger"
                               th:if="${#fields.hasErrors('symptoms')}"
                               th:errors="*{symptoms}"></small>
                    </div>

                    <div class="form-group">
                        <label>Chẩn đoán</label>
                        <textarea th:field="*{diagnosis}" class="form-control"></textarea>
                        <small class="text-danger"
                               th:if="${#fields.hasErrors('diagnosis')}"
                               th:errors="*{diagnosis}"></small>
                    </div>

                    <h5>Đơn thuốc</h5>

                    <div class="border rounded p-3 mb-3"
                         th:each="item, stat : *{items}">

                        <div class="form-group">
                            <label>Thuốc</label>
                            <select th:field="*{items[__${stat.index}__].medicineId}"
                                    class="form-control">
                                <option value="">-- Chọn thuốc --</option>
                                <option th:each="medicine : ${medicines}"
                                        th:value="${medicine.id}"
                                        th:text="${medicine.name}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Số lượng</label>
                            <input type="number"
                                   th:field="*{items[__${stat.index}__].quantity}"
                                   class="form-control">
                        </div>

                        <div class="form-group">
                            <label>Hướng dẫn sử dụng</label>
                            <input type="text"
                                   th:field="*{items[__${stat.index}__].instruction}"
                                   class="form-control">
                        </div>
                    </div>

                    <button class="btn btn-success">Lưu kết quả khám</button>
                    <a href="/doctor/appointments" class="btn btn-secondary">Quay lại</a>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
